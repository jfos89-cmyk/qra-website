    <!-- Enhanced Organization + ProfessionalService Schema Markup -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["Organization", "ProfessionalService"],
      "name": "QRA Strategies LLC",
      "url": "https://qrastrategies.com",
      "logo": "https://qrastrategies.com/QRALogo.jpeg",
      "image": "https://qrastrategies.com/QRALogo.jpeg",
      "description": "Medical device regulatory consulting and Quality Management System buildout for MedTech startups",
      "slogan": "Accelerating the Path from Innovation to Patient",
      "industry": "Medical Device Regulatory Consulting",
      "areaServed": {
        "@type": "Country",
        "name": "United States"
      },
      "serviceArea": {
        "@type": "AdministrativeArea",
        "name": "United States"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Regulatory Consulting Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "QMS Buildout",
              "description": "ISO 13485-compliant Quality Management System design and implementation"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "FDA Regulatory Strategy",
              "description": "510(k) submissions, De Novo applications, PMA strategy, and pre-submission meetings"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "CE Mark / MDR Compliance",
              "description": "EU Medical Device Regulation technical documentation and conformity assessment"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "MDSAP Certification",
              "description": "Multi-jurisdictional regulatory compliance for US, Canada, Brazil, Australia, and Japan"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Regulatory Due Diligence",
              "description": "Pre-investment and pre-acquisition regulatory risk assessments"
            }
          }
        ]
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "email": "genevieve@qrastrategies.com"
      },
      "sameAs": [
        "https://www.linkedin.com/company/qra-strategies-llc"
      ]
    }
    </script>

    <!-- SPA redirect restoration for GitHub Pages -->
    <script>
      (function(){
        var r = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (r && r !== location.href) {
          history.replaceState(null, null, r);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
